<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SURVIVOR AI Tactical Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .strategy-card { @apply border-t-8 transition-all duration-500 p-6 rounded-2xl flex flex-col justify-center text-center shadow-2xl h-full bg-gray-900 border-gray-800; }
        .is-buy { background-color: #059669 !important; border-color: #10b981 !important; color: white !important; box-shadow: 0 0 40px rgba(16, 185, 129, 0.6); }
        .is-danger { background-color: #dc2626 !important; border-color: #f87171 !important; color: white !important; animation: pulse-alert 1s infinite; box-shadow: 0 0 40px rgba(220, 38, 38, 0.6); }
        .is-wait { background-color: #d97706 !important; border-color: #fbbf24 !important; color: white !important; }
        @keyframes pulse-alert { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        .reason-box { @apply text-2xl font-bold bg-black/40 p-6 rounded-2xl border border-gray-700 leading-relaxed min-h-[160px] flex flex-col justify-center; }
    </style>
</head>
<body class="bg-[#0b0e14] text-gray-100 min-h-screen p-6 font-sans">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-6 px-2 text-yellow-500 font-black italic text-2xl">
            SURVIVOR AI <span id="clock" class="text-gray-600 font-mono text-lg ml-4 not-italic tracking-normal">--:--:--</span>
        </header>

        <!-- 頂部決策格 -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 mb-8">
            <div id="day-box" class="strategy-card md:col-span-4"><div class="text-xs font-black opacity-50 mb-1 uppercase">當沖即時指令</div><div id="day-verdict" class="text-5xl font-black italic">等待中</div></div>
            <div id="swing-box" class="strategy-card md:col-span-4"><div class="text-xs font-black opacity-50 mb-1 uppercase">波段趨勢 (Daily)</div><div id="swing-verdict" class="text-5xl font-black italic">--</div></div>
            <div class="md:col-span-4 bg-gray-900/50 p-6 rounded-2xl border border-gray-800 flex justify-between items-center px-10">
                <span class="text-blue-400 font-bold text-xs uppercase">台幣匯率</span>
                <b id="ntd-val" class="text-4xl font-mono text-white tracking-tighter">--</b>
            </div>
        </div>

        <!-- 主操作區 -->
        <div class="bg-[#161b22] p-8 rounded-3xl border border-gray-800 grid grid-cols-1 lg:grid-cols-5 gap-10 mb-8">
            <div class="lg:col-span-2 space-y-8">
                <div>
                    <div class="flex shadow-lg overflow-hidden rounded-2xl border-2 border-gray-700 bg-black">
                        <input type="text" id="stock-ticker" onclick="this.value=''" onkeyup="if(event.key==='Enter') startTracking()" placeholder="代號" class="bg-transparent p-5 w-full text-5xl font-black text-blue-400 outline-none">
                        <button onclick="startTracking()" class="bg-[#2f67e2] px-10 text-white font-black text-2xl active:bg-blue-800">追蹤</button>
                    </div>
                    <select id="spike-select" onchange="selectFromDropdown(this)" class="mt-4 w-full bg-gray-800 border border-gray-700 p-4 rounded-xl text-lg text-yellow-500 font-bold outline-none"></select>
                </div>
                <div id="stock-header" class="hidden border-l-[10px] border-yellow-500 pl-8 py-4 bg-black/20 rounded-r-3xl">
                    <h2 id="res-name" class="text-6xl font-black text-white tracking-tight mb-4 uppercase">--</h2>
                    <div class="flex items-baseline space-x-8">
                        <span class="text-white text-2xl font-bold uppercase">現價: <b id="res-price" class="text-blue-400 text-5xl font-mono">--</b></span>
                        <span class="text-gray-400 text-lg uppercase tracking-tighter">20MA: <b id="res-ma" class="text-yellow-500 text-2xl font-mono">--</b></span>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-3 h-[450px] bg-black/40 rounded-3xl p-6 border border-gray-800 relative">
                <div id="chart-date" class="absolute top-4 left-6 text-sm font-bold text-gray-600 uppercase tracking-widest">--</div>
                <canvas id="intradayChart"></canvas>
            </div>
        </div>

        <!-- 診斷原因 (大字版) -->
        <div class="bg-gray-900/90 p-8 rounded-3xl border-2 border-gray-800 shadow-2xl">
            <h3 class="text-yellow-500 font-black text-2xl mb-6 tracking-tighter italic uppercase">📋 AI Diagnostic Reasons</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 text-white">
                <div class="space-y-2">
                    <div class="text-gray-500 font-black text-sm uppercase tracking-widest ml-1">● 當沖判斷依據</div>
                    <div id="day-reason" class="reason-box">等待輸入代號...</div>
                </div>
                <div class="space-y-2">
                    <div class="text-gray-500 font-black text-sm uppercase tracking-widest ml-1">● 波段趨勢依據</div>
                    <div id="swing-reason" class="reason-box">等待輸入代號...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;
        let activeTicker = null;
        let marketFX = 32.1;

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW', {hour12:false}); }, 1000);

        async function updateMarket() {
            try {
                const res = await fetch('/api/market');
                const data = await res.json();
                if(!data || data.status !== "success") return;
                document.getElementById('ntd-val').innerText = data.fx || "--";
                marketFX = data.fx;
                const select = document.getElementById('spike-select');
                select.innerHTML = '<option value="">🔥 掃描爆量股 (量增 > 2x)...</option>';
                (data.spikes || []).forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.ticker; opt.innerText = `【${s.ratio}x】 ${s.name} - $${s.price}`;
                    select.appendChild(opt);
                });
            } catch(e){}
        }

        function selectFromDropdown(el) { if(el.value) { document.getElementById('stock-ticker').value = el.value; startTracking(); } }
        function startTracking() { activeTicker = document.getElementById('stock-ticker').value; if(activeTicker) refresh(); }

        async function refresh() {
            if(!activeTicker) return;
            try {
                const res = await fetch(`/api/stock/${activeTicker}`);
                const data = await res.json();
                if(data.status === 'success') {
                    document.getElementById('stock-header').classList.remove('hidden');
                    document.getElementById('res-name').innerText = data.name;
                    document.getElementById('res-price').innerText = data.price;
                    document.getElementById('res-ma').innerText = data.ma20;
                    document.getElementById('chart-date').innerText = `Date: ${data.date} (Intraday)`;
                    
                    const db = document.getElementById('day-box'), sb = document.getElementById('swing-box');
                    const dr = document.getElementById('day-reason'), sr = document.getElementById('swing-reason');
                    
                    db.classList.remove('is-buy','is-danger','is-wait');
                    if(data.action==="ENTRY"){ 
                        db.classList.add('is-buy'); document.getElementById('day-verdict').innerText="適合上車";
                        dr.innerHTML = `<div>● <span class="text-green-400">強勢突破：</span>現價 ${data.price} 帶量突破 MA5。</div><div class="text-gray-400 text-lg font-medium mt-2">短線攻擊動能充足，建議分批切入。</div>`;
                    } else if(data.action==="EXIT"){ 
                        db.classList.add('is-danger'); document.getElementById('day-verdict').innerText="建議下車";
                        dr.innerHTML = `<div>● <span class="text-red-400">警報：</span>跌破均線或出現長上影。</div><div class="text-gray-400 text-lg font-medium mt-2">主力出貨訊號強烈，建議立即停損或止盈。</div>`;
                    } else { 
                        document.getElementById('day-verdict').innerText="持有觀望";
                        dr.innerHTML = `<div>● <span class="text-gray-500">中性：</span>量價橫盤震盪。</div><div class="text-gray-400 text-lg font-medium mt-2">無明確發動跡象，手不要癢，繼續追蹤。</div>`;
                    }

                    sb.classList.remove('is-buy','is-danger');
                    if(data.is_above_ma20){ 
                        sb.classList.add('is-buy'); document.getElementById('swing-verdict').innerText="多頭趨勢";
                        sr.innerHTML = `<div>● <span class="text-green-400">生命線安全：</span>股價站穩月線 ${data.ma20}。</div><div class="text-gray-400 text-lg font-medium mt-2">長線多頭架構完好，適合波段續抱。</div>`;
                    } else { 
                        sb.classList.add('is-danger'); document.getElementById('swing-verdict').innerText="空頭觀望";
                        sr.innerHTML = `<div>● <span class="text-red-400">空頭警示：</span>低於生命線 ${data.ma20}。</div><div class="text-gray-400 text-lg font-medium mt-2">趨勢尚未扭轉，未站回月線前不動手。</div>`;
                    }
                    renderChart(data.intraday, data.ma20);
                } else { document.getElementById('day-verdict').innerText = "查無資料"; }
            } catch(e){}
        }

        function renderChart(cd, ma20) {
            const ctx = document.getElementById('intradayChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: cd.labels,
                    datasets: [
                        { label: '股價', data: cd.prices, borderColor: '#3b82f6', borderWidth: 4, pointRadius: 0, tension: 0.1, fill: false },
                        { label: '20MA', data: Array(cd.labels.length).fill(ma20), borderColor: '#ef4444', borderDash: [6, 6], borderWidth: 2, pointRadius: 0, fill: false }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: true, ticks: { color: '#444', maxTicksLimit: 10 } }, y: { ticks: { color: '#666', font: { size: 12 } }, grid: { color: '#1a1a1a' } } } }
            });
        }
        updateMarket();
        setInterval(updateMarket, 60000);
        setInterval(refresh, 10000);
    </script>
</body>
</html>
